name: 🕷️ Scrape & Seed Host Data (manual)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        type: choice
        required: true
        default: 'all'
        options:
          - all           # Rankings + groups + events
          - groups        # Groups + shops + hosts (fullest data)
          - rankings      # Ranking data only (lightweight)
          - events        # Weekly events only (lightweight)

permissions:
  contents: write

jobs:
  scrape-and-seed:
    name: Scrape Kabukicho Host Data
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🕷️ Run scraping pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/scrape.js --${{ github.event.inputs.mode }}-only

      - name: 🎬 Fetch latest hos-tv YouTube videos
        run: node scripts/fetch-hos-tv.js

      - name: 📤 Commit updated hos-tv data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/hos-tv.ts
          if git diff --cached --quiet; then
            echo "No changes to hos-tv.ts"
          else
            git commit -m "chore: auto-update hos-tv video data [skip ci]"
            git push
          fi

      - name: 📊 Report completion
        run: echo "✅ OshiHost scraping pipeline completed at $(date -u)"
