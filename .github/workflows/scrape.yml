name: 🕷️ Scrape & Seed Host Data

on:
  schedule:
    # Run daily at 02:00 UTC (11:00 JST)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        type: choice
        required: true
        default: 'groups'
        options:
          - groups        # Groups + shops + hosts (fullest data)
          - rankings      # Ranking data only (lightweight)
          - events        # Weekly events only (lightweight)
          - all           # Rankings + groups + events

jobs:
  scrape-and-seed:
    name: Scrape Kabukicho Host Data
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🕷️ Run scraping & seeding pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/scrape.js --${{ github.event.inputs.mode || 'all' }}-only

      - name: 📊 Report completion
        run: echo "✅ OshiHost scraping pipeline completed at $(date -u)"
