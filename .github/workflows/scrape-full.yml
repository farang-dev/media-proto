name: 🕷️ Full Host Data Scrape

on:
  schedule:
    # 1st of every 2 months at 02:00 UTC — groups + rankings + events
    - cron: '0 2 1 */2 *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        type: choice
        required: true
        default: 'all'
        options:
          - all           # Rankings + groups + events
          - groups        # Groups + shops + hosts only
          - rankings      # Ranking data only
          - events        # Weekly events only

permissions:
  contents: write

jobs:
  scrape-full:
    name: Scrape groups, rankings, and events
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🕷️ Run full scraping pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            MODE="all"
          fi
          node scripts/scrape.js --${MODE}-only

      - name: 📊 Report completion
        run: echo "✅ Full scrape completed at $(date -u)"
